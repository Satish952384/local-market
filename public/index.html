<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LocalMarket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVBAR -->
<header class="nav">
  <div class="logo">LocalMarket 🛒</div>

  <div class="search-wrap">
    <input id="search" placeholder="Search products..." />
  </div>

  <div class="nav-actions">
    <button class="link" onclick="openModal('locationModal')">📍 <span id="locText">Location</span></button>
    <button class="link" onclick="openModal('loginModal')">👤 <span id="userText">Login</span></button>
    <button class="cart-btn" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Support Local Vendors ❤️</h1>
    <p>Fresh, affordable products directly from local sellers</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
</section>

<!-- MAIN -->
<main class="container">

  <h2 id="productSection">Explore Local Products</h2>

  <!-- PRODUCTS -->
  <div id="products" class="grid"></div>

  <!-- SECTION BOX (PROFILE / ORDERS etc) -->
  <section id="sectionBox" class="section"></section>

</main>

<!-- CART -->
<aside id="cartDrawer" class="drawer">
  <div class="drawer-head">
    <h3>Your Cart</h3>
    <span class="close" onclick="toggleCart()">✖</span>
  </div>
  <div id="cartItems" class="drawer-body"></div>
  <div class="drawer-foot">
    <div class="total">Total: ₹<span id="total">0</span></div>
    <button class="primary" onclick="placeOrder()">Place Order</button>
  </div>
</aside>

<!-- LOGIN -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal('loginModal')">✖</span>
    <h2>Sign in</h2>

    <input id="email" type="email" placeholder="Enter Email"/>
    <input id="password" type="password" placeholder="Password"/>

    <button class="primary" onclick="submitLogin()">Login</button>

    <p class="or">OR</p>
    <button class="google-btn" onclick="googleLogin()">Continue with Google</button>
  </div>
</div>

<!-- LOCATION -->
<div id="locationModal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal('locationModal')">✖</span>
    <h2>Select Location</h2>

    <input id="locationInput" placeholder="Enter area / pincode"/>

    <button onclick="useCurrentLocation()">📍 Use Current Location</button>
    <button class="primary" onclick="saveLocation()">Save</button>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">

  <div>
    <h3>Your Account</h3>
    <a onclick="showSection('profile')">Profile</a>
    <a onclick="showSection('orders')">Orders</a>
  </div>

  <div>
    <h3>Support</h3>
    <a onclick="showSection('contact')">Contact</a>
  </div>

  <div>
    <h3>About</h3>
    <a onclick="showSection('about')">About Us</a>
    <a onclick="showSection('privacy')">Privacy Policy</a>
  </div>

</footer>

<script src="script.js"></script>
</body>
</html>
